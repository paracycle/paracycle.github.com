baseurl: ""

title: "Ufuk Kayserilioglu"
description: "Senior Staff Engineer - Ruby and Rails Infrastructure at Shopify"
# Rendered as a career pipeline; segments are separated by " → "
tagline: "physicist → developer → manager → developer again"
avatar: /assets/images/avatar.jpg
url: "https://ufuk.dev"
# Bare domain for display (header, OG image); unlike `url`, this is not
# overridden by `jekyll serve` in development. (Named `domain` because
# `host` is a reserved Jekyll key: the serve bind address.)
domain: "ufuk.dev"
email: ufuk@paralaus.com

# SEO
twitter:
  username: paracycle
  card: summary_large_image

social:
  name: Ufuk Kayserilioglu
  links:
    - https://twitter.com/paracycle
    - https://github.com/paracycle
    - https://linkedin.com/in/ufukkayserilioglu
    - https://ruby.social/@ufuk


highlighter: rouge
markdown: kramdown

# Pagination
paginate: 15
permalink: /posts/:title/
paginate_path: /posts/page:num/

# Social media links in footer
social:
  twitter: "paracycle"
  linkedin: "ufukkayserilioglu"
  github: "paracycle"
  mastodon: "ruby.social/@ufuk"
  bluesky: "ufuk.dev"

# Tracker: HTML injected verbatim at the end of <body>; leave empty to disable
analytics: |
  <!-- Self-hosted Plausible Analytics code -->
  <script defer src="https://analytics.paralaus.com/script.js" data-website-id="fcef8857-4847-4250-ae64-596e0afc3a2f"></script>

#collection
collections:
  talks:
    output: false
    permalink: /talks/:path/
  podcasts:
    output: false
    permalink: /podcasts/:path/

include:
  - _pages
  - assets/images

exclude:
  - README.md
  - LICENSE.md
  - design-options

navigation:
  - title: Home
    url: /
  - title: Talks
    url: /talks/
  - title: Podcasts
    url: /podcasts/
  # - title: Posts
  #   url: /posts/
  # - title: Archive
  #   url: /archive/

defaults:
  - scope:
      path: "assets/images"
    values:
      image: true
  # Site-wide Open Graph / Twitter card image; pages and posts can
  # override it with their own `image:` front matter.
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png

plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-email-protect
  - jekyll-link-attributes
  - jekyll-compose
