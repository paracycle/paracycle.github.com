<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">

  <!-- Set the theme before first paint to avoid a flash of the wrong mode -->
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.dataset.theme =
        stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    })();
  </script>

  <link rel="stylesheet" href="{{site.baseurl}}/assets/css/main.css">

  {% seo %}

  {% include favicon.html %}
</head>

<body class="{{ page.dir | replace: "/", "" }}">
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-title" href="{{site.baseurl}}/"><span class="tilde">~</span>/{{ site.domain }}<span class="cursor"></span></a>
      {% include navigation.html %}
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      {% include social-footer.html %}
      <p class="footer-note">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </div>
  </footer>

  <script>
    document.getElementById("theme-toggle").addEventListener("click", function () {
      var root = document.documentElement;
      var next = root.dataset.theme === "dark" ? "light" : "dark";
      root.dataset.theme = next;
      localStorage.setItem("theme", next);
    });
  </script>

  {{ site.analytics }}
</body>
</html>
