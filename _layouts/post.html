---
layout: default
---
<article class="post">
  <header class="post-header">
    {% if page.date %}
    <p class="post-meta"><span class="kw">#</span> <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %-d, %Y' }}</time></p>
    {% endif %}
    <h1 class="post-title">{{ page.title }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
